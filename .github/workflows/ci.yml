# Tier-1 CI. Lint runs on GitHub-hosted; build+test needs installed HPX so it runs
# on the self-hosted Rostam runner. Perf gate lives in bench.yml (Rostam, on-demand).
#
# SECURITY (public repo + self-hosted runner): the build-test job must NEVER run
# untrusted code on Rostam. It is guarded to run only on pushes and on PRs that
# originate from a branch *in this repo* (not forks). Fork PRs skip it; a maintainer
# vets and re-runs them deliberately.
name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install ruff
      - run: ruff check hpxpy tests benchmarks
        continue-on-error: true   # bootstrap: informational; tighten to required later

  build-test:
    # Only trusted events on the self-hosted Rostam runner (no fork code).
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, rostam]
    steps:
      - uses: actions/checkout@v4
      - name: Build + test (local == CI gate)
        run: bash scripts/check.sh

  build-test-distributed:
    # Only trusted events on the self-hosted Rostam runner (no fork code).
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, rostam]
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build editable install
        run: |
          source env.sh >/dev/null
          unset LD_PRELOAD
          "$PY" -m pip install -e ".[test]" --no-cache-dir \
            -C cmake.define.CMAKE_CXX_COMPILER=/opt/apps/gcc/15.1.0/bin/g++ \
            -C cmake.define.CMAKE_PREFIX_PATH="$HPX_ROOT" \
            -C cmake.define.HPX_DIR="$HPX_DIR"
      - name: 2-locality distributed smoke test
        run: source env.sh >/dev/null && LD_PRELOAD="$HPXPY_TCMALLOC" "$PY" -m pytest -m distributed tests/test_distributed.py
