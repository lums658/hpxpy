# Tier-1 CI. Lint runs on GitHub-hosted; build+test needs installed HPX so it runs
# on the self-hosted Rostam runner. Perf gate lives in bench.yml (Rostam, on-demand).
name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install ruff
      - run: ruff check hpxpy tests benchmarks
        continue-on-error: true   # bootstrap: informational; tighten to required later

  build-test:
    runs-on: [self-hosted, rostam]
    steps:
      - uses: actions/checkout@v4
      - name: Build + test (local == CI gate)
        run: bash scripts/check.sh
