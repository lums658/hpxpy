# Tier-2 perf gate — runs on the self-hosted Rostam runner, on an EXCLUSIVE node.
# Triggered manually (workflow_dispatch) or by adding the 'run-bench' label to a PR
# (maintainer action). Drives benchmarks.runner's thread/size sweep; the C++
# baseline (and thus the abstraction-penalty column) is added via --baseline once
# the cpp_baseline binary lands.
#
# Security: only same-repo (non-fork) refs run on the runner.
name: bench
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  perf:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'run-bench' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, rostam]
    steps:
      - uses: actions/checkout@v4
      - name: microbenchmark sweep on an exclusive medusa node
        run: |
          srun --partition=medusa --nodes=1 --exclusive --time=0:20:00 --cpus-per-task=40 \
            bash -c '
              source env.sh
              unset LD_PRELOAD
              "$PY" -m pip install -e ".[test]" --no-cache-dir \
                -C cmake.define.CMAKE_CXX_COMPILER=/opt/apps/gcc/15.1.0/bin/g++ \
                -C cmake.define.CMAKE_PREFIX_PATH="$HPX_ROOT" \
                -C cmake.define.HPX_DIR="$HPX_DIR" >/dev/null
              LD_PRELOAD="$HPXPY_TCMALLOC" "$PY" -m benchmarks.runner sweep \
                --op sum --sizes 1e6,1e7,1e8 --threads 1,2,4,8,16,32,40 \
                --out bench_results.csv
            '
      - name: upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench_results
          path: bench_results.csv
          if-no-files-found: ignore
